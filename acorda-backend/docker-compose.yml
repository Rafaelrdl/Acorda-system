services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: acorda
      POSTGRES_USER: acorda
      POSTGRES_PASSWORD: acorda
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acorda"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --workers 2 --threads 4 --reload config.wsgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=postgres://acorda:acorda@db:5432/acorda
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=http://localhost:5173
      - BACKEND_URL=http://localhost:8000
      - EMAIL_HOST=${EMAIL_HOST:-smtp.hostinger.com}
      - EMAIL_PORT=${EMAIL_PORT:-465}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-contato@somosacorda.com}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-True}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-False}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-Acorda <contato@somosacorda.com>}
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    entrypoint: []
    command: celery -A config worker -l INFO
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=postgres://acorda:acorda@db:5432/acorda
      - REDIS_URL=redis://redis:6379/0
      - EMAIL_HOST=${EMAIL_HOST:-smtp.hostinger.com}
      - EMAIL_PORT=${EMAIL_PORT:-465}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-contato@somosacorda.com}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-True}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-False}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-Acorda <contato@somosacorda.com>}
    depends_on:
      web:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    entrypoint: []
    command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=postgres://acorda:acorda@db:5432/acorda
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      web:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
