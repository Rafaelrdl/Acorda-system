# Production overrides – usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# All secrets MUST be supplied via environment variables or a .env file.
# Never commit real secrets to version control.

services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports: []            # Do not expose DB port in production

  redis:
    ports: []            # Do not expose Redis port in production

  web:
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 --threads 4 config.wsgi:application
    volumes: []          # No bind-mount in production – use image only
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY}
      - DATABASE_URL=postgres://acorda:${POSTGRES_PASSWORD}@db:5432/acorda
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:?Set ALLOWED_HOSTS}
      - FRONTEND_URL=${FRONTEND_URL:?Set FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL:?Set BACKEND_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:?Set CSRF_TRUSTED_ORIGINS}
      - SECURE_PROXY_SSL_HEADER=HTTP_X_FORWARDED_PROTO,https
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET:-}
    restart: always

  celery:
    command: celery -A config worker -l WARNING --concurrency 4
    volumes: []
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgres://acorda:${POSTGRES_PASSWORD}@db:5432/acorda
      - REDIS_URL=redis://redis:6379/0
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET:-}
    restart: always

  celery-beat:
    command: celery -A config beat -l WARNING --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes: []
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgres://acorda:${POSTGRES_PASSWORD}@db:5432/acorda
      - REDIS_URL=redis://redis:6379/0
    restart: always
