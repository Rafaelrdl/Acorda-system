# Production overrides – usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# All secrets MUST be supplied via a .env file at the project root.
# Never commit real secrets to version control.
#
# Required env vars:
#   SECRET_KEY, POSTGRES_PASSWORD, ALLOWED_HOSTS, FRONTEND_URL,
#   BACKEND_URL, CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS,
#   ADMIN_PASSWORD, VITE_API_URL

services:
  # ── Banco de dados ────────────────────────────────────────
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports: []            # Do not expose DB port in production

  # ── Cache / Broker ────────────────────────────────────────
  redis:
    ports: []            # Do not expose Redis port in production
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── Backend Django ────────────────────────────────────────
  web:
    command: >-
      gunicorn --bind 0.0.0.0:8000
      --workers 4 --threads 4
      --timeout 120 --graceful-timeout 30
      --max-requests 1000 --max-requests-jitter 50
      --access-logfile - --error-logfile -
      config.wsgi:application
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY}
      - DATABASE_URL=postgres://acorda:${POSTGRES_PASSWORD}@db:5432/acorda
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:?Set ALLOWED_HOSTS}
      - FRONTEND_URL=${FRONTEND_URL:?Set FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL:?Set BACKEND_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:?Set CSRF_TRUSTED_ORIGINS}
      - SECURE_PROXY_SSL_HEADER=HTTP_X_FORWARDED_PROTO,https
      - USE_X_FORWARDED_HOST=True
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@somosacorda.com}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-465}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-True}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-False}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-Acorda <contato@somosacorda.com>}
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET:-}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  # ── Celery Worker ─────────────────────────────────────────
  celery:
    command: celery -A config worker -l WARNING --concurrency 4
    volumes: []
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgres://acorda:${POSTGRES_PASSWORD}@db:5432/acorda
      - REDIS_URL=redis://redis:6379/0
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-465}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-True}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-False}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-Acorda <contato@somosacorda.com>}
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET:-}
    restart: always

  # ── Celery Beat ───────────────────────────────────────────
  celery-beat:
    command: celery -A config beat -l WARNING --scheduler django_celery_beat.schedulers:DatabaseScheduler --pidfile=""
    volumes: []
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgres://acorda:${POSTGRES_PASSWORD}@db:5432/acorda
      - REDIS_URL=redis://redis:6379/0
    restart: always

  # ── Frontend (Nginx + SPA build) ──────────────────────────
  frontend:
    image: ""  # Clear the node:20-alpine image
    build:
      context: ./acorda
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL}
    command: []  # Clear the dev command
    volumes: []  # No bind mounts
    ports:
      - "80:80"
    restart: always

volumes:
  postgres_data:
  media_data:
